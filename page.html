    <script>
    // Search Input မှာ စာရိုက်တိုင်း အလုပ်လုပ်မယ့်စနစ် (Real-time Search)
document.getElementById('searchInput').addEventListener('input', async (e) => {
    const query = e.target.value.trim();
    const resultBox = document.getElementById('searchResults');

    if (query.length < 1) {
        resultBox.innerHTML = "";
        return;
    }

    try {
        // Supabase ထဲက pages_list table ထဲမှာ page_name ကို ရှာမယ်
        // Table နာမည်ကို Senior သတ်မှတ်ထားတဲ့အတိုင်း ပြောင်းပေးပါ (ဥပမာ - 'app_pages')
        const { data, error } = await sb
            .from('pages_list') 
            .select('page_name, page_url')
            .ilike('page_name', `%${query}%`)
            .limit(5);

        if (error) throw error;

        if (data.length > 0) {
            resultBox.innerHTML = data.map(item => `
                <a href="${item.page_url}" style="display: block; background: white; padding: 12px; margin-bottom: 5px; 
                   border-radius: 10px; text-decoration: none; color: #6A1B9A; border-left: 5px solid #6A1B9A; 
                   box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold;">
                   🚀 သွားရန် - ${item.page_name}
                </a>
            `).join('');
        } else {
            resultBox.innerHTML = '<p style="color: gray; font-size: 13px; padding-left: 10px;">ကိုက်ညီသည့် Page မရှိပါ Senior။</p>';
        }

    } catch (e) {
        console.error("Search Error:", e.message);
    }
});
</script>
